# Program traces
# Минимальный рабочий профиль.
# Оставлены только обязательные ключи и полезные override-параметры.
# Полный список опций: docs/CONFIGURATION.md

[General]
# Порядок секций важен: так выполняется проверка версий в OS detection.
Versions = WindowsXP, WindowsVista, Windows7, Windows8, Windows10, Windows11, WindowsServer
# Разрешает best-effort запуск, если версию ОС не удалось определить.
EnableBestEffortRun = true
# Версия профиля для fallback-режима (если не определена ОС по hive).
FallbackOSVersion = Windows10

[Logging]
# Включает/выключает DEBUG-логи этапа EventLog.
DebugEventLog = false

[Performance]
# Разрешает параллельный запуск независимых этапов.
EnableParallelStages = true

[OSInfoRegistryPaths]
# Путь к SOFTWARE hive по умолчанию/для конкретной версии.
Default = Windows/System32/config/SOFTWARE
WindowsXP = WINDOWS/system32/config/software
WindowsServer = WINDOWS/system32/config/software

[OSInfoSystemRegistryPaths]
# Путь к SYSTEM hive по умолчанию/для конкретной версии.
Default = Windows/System32/config/SYSTEM
WindowsXP = WINDOWS/system32/config/system
WindowsServer = WINDOWS/system32/config/system

[OSInfoHive]
# Раздел в SOFTWARE hive, откуда читаются ключи версии ОС.
Default = Microsoft/Windows NT/CurrentVersion

[OSInfoKeys]
# Значения реестра, которые используются для определения и нормализации версии ОС.
Default = ProductName,InstallationType,CurrentBuild,CurrentBuildNumber,ReleaseId,DisplayVersion,EditionID,CurrentVersion,CSDVersion

[BuildMappingsClient]
# Пороговые build->имя для клиентских ОС (берется наибольший <= текущему build).
2600 = Windows XP
6000 = Windows Vista
7600 = Windows 7
9200 = Windows 8
10240 = Windows 10
22000 = Windows 11

[BuildMappingsServer]
# Пороговые build->имя для серверных ОС (берется наибольший <= текущему build).
3790 = Windows Server 2003
6001 = Windows Server 2008
7600 = Windows Server 2008 R2
9200 = Windows Server 2012
9600 = Windows Server 2012 R2
14393 = Windows Server 2016
17763 = Windows Server 2019
20348 = Windows Server 2022
26100 = Windows Server 2025

[OSKeywords]
# Fallback-ключевые слова для распознавания server edition.
DefaultServerKeywords = Datacenter, Enterprise, Storage, Cluster, Foundation, Essentials, Small Business, MultiPoint, Hyper-V, Azure, Cloud, Nano, Web

[Recovery]
# Включает/выключает поиск следов запуска в unallocated image.
EnableUnallocated = false
# Включает/выключает NTFS recovery по `$MFT/$Bitmap` (минимальный обязательный метод).
EnableNTFSMetadata = true

# ---- Сигнатурный сканер ----
# Включает/выключает сигнатурное сканирование (SignatureScanner).
EnableSignatureScan = true
# Сканировать pagefile.sys и swapfile.sys.
SignatureScanPagefile = true
# Сканировать hiberfil.sys.
SignatureScanHiberfil = true
# Явный путь к образу диска (опционально; переопределяется флагом --image).
# SignatureScanPath = /mnt/evidence/disk.img
# Размер блока чтения в КБ (минимум 4, по умолчанию 64).
SignatureScanBlockSizeKB = 64
# Максимальный объём данных для сканирования на файл (МБ).
SignatureScanMaxMB = 512
# Максимальное число найденных артефактов на файл.
SignatureScanMaxCandidates = 5000

[ExecutionArtifacts]
# ---- Флаги включения источников ----
EnableShimCache = true
EnableUserAssist = true
EnableRunMRU = true
EnableFeatureUsage = true
EnableRecentApps = true
EnableBamDam = true
EnableServices = true
EnableHostsFile = true
EnableNetworkProfiles = true
EnableJumpLists = true
EnableLnkRecent = true
EnableTaskScheduler = true
EnableWER = true
EnableIFEO = true
EnableTimeline = true
EnableBITS = true
EnableWMIRepository = true
EnableWindowsSearch = true
EnableNativeWindowsSearchParser = true
WindowsSearchFallbackToBinaryOnNativeFailure = true
EnableSRUM = true
EnableNativeSRUM = true
SrumFallbackToBinaryOnNativeFailure = true
EnableMuiCache = true
EnableAppCompatFlags = true
EnableTypedPaths = true
EnableLastVisitedMRU = true
EnableOpenSaveMRU = true
EnablePSHistory = true
# ---- Флаги детекторов антифорензики ----
EnableSecurityLogTamperCheck = true
EnableSystemLogTamperCheck = true
EnableRegistryStateTamperCheck = true
EnableArtifactPresenceTamperCheck = true
# ---- Лимиты производительности ----
# Максимальный объём бинарного сканирования на источник (МБ).
BinaryScanMaxMB = 64
# Максимальное число кандидатов на источник.
MaxCandidatesPerSource = 2000
# Максимальное число записей SRUM на таблицу (native-режим).
SrumNativeMaxRecordsPerTable = 25000
# Максимальное число записей Windows Search на таблицу (native-режим).
WindowsSearchNativeMaxRecordsPerTable = 25000

[TamperRules]
# Включает детектирование расхождения $SI/$FN временных меток ($MFT).
EnableSIFNDivergenceCheck = true
# Порог расхождения временных меток $SI и $FN в секундах (по умолчанию 2 часа).
TimestampDivergenceThresholdSec = 7200
# Требовать наличия process-image для срабатывания правила PrefetchMissingOnDisk.
PrefetchMissingRequireProcessImage = true

[VersionDefaults]
# Базовый путь к SOFTWARE hive для анализа автозапуска/артефактов.
RegistryPath = Windows/System32/config/SOFTWARE
# Базовые ветки автозапуска в SOFTWARE hive.
RegistryKeys = Microsoft/Windows/CurrentVersion/Run,Microsoft/Windows/CurrentVersion/RunOnce
# Базовые пути автозагрузки в ФС (поддерживаются wildcard-профили Users/*).
FilesystemPaths = ProgramData/Microsoft/Windows/Start Menu/Programs/Startup,Users/*/AppData/Roaming/Microsoft/Windows/Start Menu/Programs/Startup
# Каталог Prefetch.
PrefetchPath = Windows/Prefetch
# Путь к каталогу/файлам EventLog.
EventLogs = Windows/System32/winevt/Logs/
# ID событий создания/завершения процесса.
ProcessEventIDs = 4688,4689
# ID сетевых событий для корреляции.
NetworkEventIDs = 5156,5157
# Путь к Amcache hive.
AmcachePath = Windows/appcompat/Programs/Amcache.hve
# Базовый ключ Amcache для извлечения записей.
AmcacheKeys = Root/InventoryApplicationFile

[Windows11]
# Дополнительный 32-bit ключ автозапуска.
RegistryKeys = Microsoft/Windows/CurrentVersion/Run,Microsoft/Windows/CurrentVersion/RunOnce,Wow6432Node/Microsoft/Windows/CurrentVersion/Run
# Расширенный набор network event IDs.
NetworkEventIDs = 5156,5157,3,1001,1002,300,302,21,1149,5031

[Windows10]
# Дополнительный 32-bit ключ автозапуска.
RegistryKeys = Microsoft/Windows/CurrentVersion/Run,Microsoft/Windows/CurrentVersion/RunOnce,Wow6432Node/Microsoft/Windows/CurrentVersion/Run
# Расширенные startup-пути (включая legacy профили).
FilesystemPaths = ProgramData/Microsoft/Windows/Start Menu/Programs/Startup,Users/*/AppData/Roaming/Microsoft/Windows/Start Menu/Programs/Startup,Documents and Settings/All Users/Start Menu/Programs/Startup,Documents and Settings/*/Start Menu/Programs/Startup,Microsoft/Windows/Start Menu/Programs/Startup
# Расширенный набор network event IDs.
NetworkEventIDs = 5156,5157,3,1001,1002,300,302,21,1149,5031

[Windows8]
# Дополнительный 32-bit ключ автозапуска.
RegistryKeys = Microsoft/Windows/CurrentVersion/Run,Microsoft/Windows/CurrentVersion/RunOnce,Wow6432Node/Microsoft/Windows/CurrentVersion/Run

[Windows7]
# Для Win7 чаще используется только 4688.
ProcessEventIDs = 4688
# Базовый сетевой event ID для Win7.
NetworkEventIDs = 5156
# Fallback-источник для систем без Amcache.hve.
RecentFileCachePath = Windows/AppCompat/Programs/RecentFileCache.bcf

[WindowsVista]
# Legacy process event ID.
ProcessEventIDs = 592
# Legacy network event ID.
NetworkEventIDs = 861
# Для Vista Amcache обычно отсутствует.
AmcachePath =
# Для Vista Amcache обычно отсутствует.
AmcacheKeys =

[WindowsXP]
# Регистр путей в XP обычно верхний.
RegistryPath = WINDOWS/system32/config/software
# Startup-пути профилей XP.
FilesystemPaths = Documents and Settings/All Users/Start Menu/Programs/Startup,Documents and Settings/*/Start Menu/Programs/Startup
# Каталог Prefetch в XP.
PrefetchPath = WINDOWS/Prefetch
# Классические EVT-журналы XP.
EventLogs = WINDOWS/system32/config/AppEvent.Evt,WINDOWS/system32/config/SecEvent.Evt,WINDOWS/system32/config/SysEvent.Evt
# Legacy process event ID.
ProcessEventIDs = 592
# Legacy network event ID.
NetworkEventIDs = 861
# В XP Amcache отсутствует.
AmcachePath =
# В XP Amcache отсутствует.
AmcacheKeys =

[WindowsServer]
# Дополнительный 32-bit ключ автозапуска для server edition.
RegistryKeys = Microsoft/Windows/CurrentVersion/Run,Microsoft/Windows/CurrentVersion/RunOnce,Wow6432Node/Microsoft/Windows/CurrentVersion/Run
