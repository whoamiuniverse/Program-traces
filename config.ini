# 1.  =============ГЛОБАЛЬНЫЕ НАСТРОЙКИ ПРИЛОЖЕНИЯ=============

# 1.1 ---------Настройки поддерживаемых версий Windows---------
[General]
# Порядок версий здесь определяет порядок проверок в детекторе ОС.
Versions = WindowsXP, WindowsVista, Windows7, Windows8, Windows10, Windows11, WindowsServer

# 1.2 -------------------Настройки логирования------------------
[Logging]
# Эти флаги управляют подробными DEBUG-логами по этапам анализа.
# INFO/WARN/ERROR остаются активными независимо от флагов.
DebugOSDetection = true
DebugAutorun = true
DebugPrefetch = true
DebugEventLog = false
DebugAmcache = true
DebugExecution = true
DebugRecovery = true

# 1.2.1 ------------------Настройки производительности-----------------
[Performance]
EnableParallelStages = true
WorkerThreads = 4
MaxIOWorkers = 4
EnableParallelPrefetch = true
EnableParallelEventLog = true
EnableParallelUserHives = true

# 1.3 ---------------------Настройки CSV------------------------
[CSVExport]
# Максимум имен в колонке "ФайловыеМетрики" (0 = без ограничения)
MetricMaxNames = 200

# Правила фильтрации имен метрик (регистронезависимо, через запятую)
MetricSkipPrefixes = tmp,~tmp
MetricSkipContains = .tmp
MetricSkipExact =

# Дополнительные эвристики для шумных токенов без расширения
DropShortUpperTokens = true
ShortUpperTokenMaxLength = 3
DropHexLikeTokens = true
HexLikeMinLength = 16
DropUpperAlnumTokens = true
UpperAlnumMinLength = 8

# 1.4 ----------------------Правила Tamper------------------------
[TamperRules]
# prefetch_missing_but_other_artifacts_present
EnablePrefetchMissingRule = true
PrefetchMissingRequireProcessImage = true
PrefetchMissingRuntimeSources = EventLog,UserAssist,RunMRU,FeatureUsage,BAM,DAM,JumpList,LNKRecent,RecentApps,TaskScheduler,IFEO,WER,Timeline,BITS,WMIRepository,WindowsSearch,SRUM

# amcache_deleted_trace
EnableAmcacheDeletedTraceRule = true

# registry_inconsistency
EnableRegistryInconsistencyRule = true
RegistryOnlySources = RunMRU,UserAssist,BAM,DAM,ShimCache
RegistryStrongSources = Prefetch,Amcache,EventLog,SRUM


# 2.  ==============НАСТРОЙКИ ОПРЕДЕЛЕНИЯ ВЕРСИИ ОС============

# 2.1 ------------------Пути к SOFTWARE-hive--------------------
# Логика: сначала ищется ключ <Version>, затем Default.
[OSInfoRegistryPaths]
Default = Windows/System32/config/SOFTWARE
WindowsXP = WINDOWS/system32/config/software
WindowsServer = WINDOWS/system32/config/software

# 2.1.1 -------------Пути к SYSTEM-hive (ProductType)----------
# ProductType используется как приоритетный признак client/server.
[OSInfoSystemRegistryPaths]
Default = Windows/System32/config/SYSTEM
WindowsXP = WINDOWS/system32/config/system
WindowsServer = WINDOWS/system32/config/system

# 2.2 --------------Путь к разделу CurrentVersion---------------
[OSInfoHive]
Default = Microsoft/Windows NT/CurrentVersion

# 2.3 ----------------Ключи для чтения из hive------------------
[OSInfoKeys]
Default = ProductName,InstallationType,CurrentBuild,CurrentBuildNumber,ReleaseId,DisplayVersion,EditionID,CurrentVersion,CSDVersion

# 2.4 ------------Сопоставления сборок клиентских ОС------------
# ВНИМАНИЕ: здесь указываются пороговые (минимальные) сборки семейств ОС.
# Детектор выбирает запись с МАКСИМАЛЬНЫМ build <= текущей сборки.
[BuildMappingsClient]
2600 = Windows XP
6000 = Windows Vista
7600 = Windows 7
9200 = Windows 8
10240 = Windows 10
22000 = Windows 11

# 2.5 ------------Сопоставления сборок серверных ОС-------------
# ВНИМАНИЕ: здесь указываются пороговые (минимальные) сборки семейств ОС.
# Детектор выбирает запись с МАКСИМАЛЬНЫМ build <= текущей сборки.
[BuildMappingsServer]
3790 = Windows Server 2003
6001 = Windows Server 2008
7600 = Windows Server 2008 R2
9200 = Windows Server 2012
9600 = Windows Server 2012 R2
14393 = Windows Server 2016
17763 = Windows Server 2019
20348 = Windows Server 2022
26100 = Windows Server 2025

# 2.6 ----------Ключевые слова для серверной редакции-----------
[OSKeywords]
DefaultServerKeywords = Datacenter, Enterprise, Storage, Cluster, Foundation, Essentials, Small Business, MultiPoint, Hyper-V, Azure, Cloud, Nano, Web


# 3.  =============НАСТРОЙКИ АНАЛИЗА АРТЕФАКТОВ================

# 3.0 ----------------Параметры восстановления------------------
[Recovery]
EnableUSN = true
EnableVSS = true
EnableHiber = true
EnableNTFSMetadata = true
EnableRegistryLogsRecovery = true
EnableNativeUSNParser = true
USNFallbackToBinaryOnNativeFailure = true
USNNativeMaxRecords = 200000
# Путь к экспортированному $J (если $Extend/$UsnJrnl не виден через mount)
USNJournalPath =
EnableNativeVSSParser = true
VSSFallbackToBinaryOnNativeFailure = true
VSSNativeMaxStores = 32
EnableVSSSnapshotReplay = true
VSSSnapshotReplayMaxFiles = 200
# Путь к raw-образу/устройству для native VSS (если пусто, используется autodetect)
VSSVolumePath =
EnableNativeHiberParser = true
HiberFallbackToBinary = true
HiberMaxPages = 16384
HiberPath = hiberfil.sys
EnableNativeFsntfsParser = true
FsntfsFallbackToBinaryOnNativeFailure = true
MFTPath = $MFT
MFTMaxRecords = 200000
MFTRecordSize = 1024
BitmapPath = $Bitmap
RegistryConfigPath = Windows/System32/config
EnableLogFile = true
EnablePagefile = true
EnableMemory = true
EnableUnallocated = false
# Укажите путь к raw-образу/файлу, если хотите сканировать отдельно
UnallocatedImagePath =
BinaryScanMaxMB = 64
MaxCandidatesPerSource = 2000

